stages:
  - test
  - build

variables:
  IMAGE_NAME: 192.168.1.66:5050/monarch/fastapi-todo-devops

test:
  stage: test
  image: python:3.11-slim
  tags:
    - runner
  script:
    - pip install --no-cache-dir -r requirements.txt
    - pytest

build:
  stage: build
  image: docker:27
  tags:
    - runner
  services:
    - name: docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login 192.168.1.66:5050 -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - docker version
    - docker build -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:latest
