stages:
  - test

test:
  stage: test
  image: python:3.11-slim
  tags:
    - runner
  script:
    - pip install --no-cache-dir -r requirements.txt
    - pytest

build:
  stage: build
  image: docker:27
  tags:
    - runner
  services:
    - name: docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker version
    - docker build -t todo-app:latest .

